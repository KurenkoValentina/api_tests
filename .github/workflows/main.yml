# Это комментарий.
# Это название пайплайна
name: pw7 автотесты API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # ручной запуск
  workflow_dispatch:

jobs:
  pw7:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Установить пакет
        run: npm ci
      - name: Установить браузеры
        run: npx playwright install --with-deps
      - name: Install Allure
        run: npm install -g allure-commandline
      - name: Запусти тесты
        run: npm t --reporter=allure-playwright
      - name: Генерируем отчет
        run: npx allure generate ./allure-results --clean -o allure-report
        continue-on-error: true
        if: always()
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        if: always()
        with:
          name: artifacts
          path: |
            allure-report/index.html
            allure-results
            playwright-report
